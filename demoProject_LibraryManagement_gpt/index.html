<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Library Management Modular</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Library Management System (Modular)</h1>

  <form id="bookForm">
    <input type="text" id="title" placeholder="Book Title" required />
    <input type="text" id="author" placeholder="Author" required />
    <input type="number" id="year" placeholder="Year" required min="1500" max="2100" />
    <select id="type" required>
      <option value="" disabled selected>Select Type</option>
      <option value="Book">Book</option>
      <option value="Magazine">Magazine</option>
      <option value="eBook">eBook</option>
    </select>
    <button type="submit">Add Book</button>
  </form>

  <table id="bookTable">
    <thead>
      <tr>
        <th>ID</th><th>Title</th><th>Author</th><th>Year</th><th>Type</th><th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
